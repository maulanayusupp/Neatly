<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d16"/>
      <stop offset="1" stop-color="#171a2e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#brand)"/>

  <!-- Brand -->
  <g transform="translate(80,74)">
    <rect width="76" height="76" rx="21" fill="url(#brand)"/>
    <path fill="#0b0d16" d="M32 17l4 13.1L49 34l-13 4-4 13-4-13-13-4 13-3.9z"/>
    <path fill="#0b0d16" fill-opacity="0.8" d="M53 42l1.7 5.7 5.7 1.7-5.7 1.7L53 57l-1.7-5.9-5.7-1.7 5.7-1.7z"/>
    <text x="96" y="52" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#e9ebf5" letter-spacing="-1">Neatly</text>
  </g>

  <!-- Headline -->
  <text x="80" y="268" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#e9ebf5" letter-spacing="-3">Beautify, Minify &amp;</text>
  <text x="80" y="352" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-3"><tspan fill="url(#brand)">Unminify</tspan><tspan fill="#e9ebf5"> your code</tspan></text>

  <!-- Languages -->
  <text x="82" y="424" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#9aa2bd">JavaScript · CSS · HTML · JSON · YAML · CSV · XML</text>

  <!-- Feature chips -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">
    <g transform="translate(80,470)">
      <rect width="240" height="58" rx="29" fill="#1d2130" stroke="#2a2f42"/>
      <text x="120" y="38" fill="#a5b4fc" text-anchor="middle">Convert formats</text>
    </g>
    <g transform="translate(340,470)">
      <rect width="230" height="58" rx="29" fill="#1d2130" stroke="#2a2f42"/>
      <text x="115" y="38" fill="#a5b4fc" text-anchor="middle">Compare JSON</text>
    </g>
    <g transform="translate(590,470)">

      <text x="130" y="38" fill="#a5b4fc" text-anchor="middle">QR &amp; barcode scan</text>
    </g>
  </g>

  <text x="80" y="588" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#6f778f">neatlyapp.vercel.app</text>
